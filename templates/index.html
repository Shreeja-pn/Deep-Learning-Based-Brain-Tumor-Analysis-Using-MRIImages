<!DOCTYPE html>
<html>

<head>

<title>Brain Tumor Analysis System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial;
}

body{
background:linear-gradient(rgba(10,20,40,0.8),rgba(10,20,40,0.9)),
url("/static/images/brain_bg.jpg");
background-size:cover;
background-position:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{

width:650px;
background:rgba(20,35,60,0.85);
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.7);
backdrop-filter:blur(6px);

}

h1{
text-align:center;
margin-bottom:10px;
font-size:32px;
}

.subtitle{
text-align:center;
color:#c7d5e5;
margin-bottom:30px;
font-size:15px;
}

.form-group{
margin-bottom:18px;
text-align:left;
}

label{
font-weight:bold;
font-size:14px;
}

input, select{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
background:#0e1a2b;
color:white;
}

input[type=file]{
background:#0e1a2b;
}

button{

width:100%;
padding:12px;
background:#00c3ff;
border:none;
border-radius:6px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:20px;

}

button:hover{
background:#0099cc;
}

.note{
text-align:center;
font-size:12px;
color:#a9b9cc;
margin-top:15px;
}

.footer{
margin-top:20px;
text-align:center;
font-size:12px;
color:#7f9dbb;
}

</style>

</head>


<body>

<div class="container">

<h1>Brain Tumor Analysis</h1>

<p class="subtitle">
AI-Powered MRI Tumor Segmentation and Classification
</p>

<form action="/predict" method="POST" enctype="multipart/form-data">

<div class="form-group">
<label>Patient Name</label>
<input type="text" name="patient_name" placeholder="Enter patient name" required>
</div>


<div class="form-group">
<label>Upload BraTS Patient Folder</label>
<input type="file" name="folder" webkitdirectory directory multiple required>
</div>

<button type="submit">
Run Tumor Analysis
</button>

</form>

<p class="note">
Supported dataset: BraTS MRI (.nii / .nii.gz)
</p>

<div class="footer">
Brain Tumor AI Detection System
</div>

</div>

</body>

</html>
